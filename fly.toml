# Fly.io: dalla root del repo, dopo `fly auth login` e `fly launch` (scegli Dockerfile esistente).
# https://fly.io/docs/launch/
app = "allegato-a1-pdf"
primary_region = "ams"

[build]
  dockerfile = "Dockerfile"

[http_service]
  internal_port = 8787
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0
  processes = ["app"]

[[vm]]
  memory = "2gb"
  cpu_kind = "shared"
  cpus = 1
